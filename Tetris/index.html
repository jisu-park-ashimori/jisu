<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Tetris</title>
    <meta name="description" content="네온 스타일의 모던 바닐라 테트리스 게임">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-container">
        <!-- 메인 게임 보드 -->
        <div class="main-screen">
            <!-- 10x20 그리드 30px 타일 (300x600) -->
            <canvas id="tetris-canvas" width="300" height="600"></canvas>
            
            <div id="game-over" class="overlay hidden">
                <h2 class="neon-pink">GAME OVER</h2>
                <div class="score-display">최종 점수: <span id="final-score" class="neon-cyan-text">0</span></div>
                <button id="restart-btn" class="neon-button pink-glow">RESTART</button>
            </div>
            
            <div id="paused" class="overlay hidden">
                <h2 class="neon-cyan">PAUSED</h2>
                <button id="resume-btn" class="neon-button cyan-glow">RESUME</button>
            </div>
            
            <div id="start-screen" class="overlay">
                <h2 class="neon-magenta">NEON TETRIS</h2>
                <button id="start-btn" class="neon-button magenta-glow">PLAY</button>
            </div>
        </div>
        
        <!-- 오른쪽 상태 표시 패널 -->
        <div class="side-panel">
            <div class="panel-section score-section">
                <h3>SCORE</h3>
                <div id="score" class="neon-number">0</div>
            </div>
            <div class="panel-section lines-section">
                <h3>LINES</h3>
                <div id="lines" class="neon-number">0</div>
            </div>
            <div class="panel-section next-section">
                <h3>NEXT</h3>
                <canvas id="next-canvas" width="120" height="120"></canvas>
            </div>
            <div class="panel-section controls-section">
                <h3>CONTROLS</h3>
                <p><span>←</span> <span>→</span> <span class="desc">이동</span></p>
                <p><span>↑</span> <span class="desc">회전</span></p>
                <p><span>↓</span> <span class="desc">소프트 드랍</span></p>
                <p><span>Space</span> <span class="desc">하드 드랍</span></p>
                <p><span>P</span> <span class="desc">일시정지</span></p>
            </div>
        </div>
    </div>
    
    <!-- 모바일 전용 온스크린 컨트롤 -->
    <div class="mobile-controls">
        <div class="control-row">
            <button id="btn-up" class="mobile-btn">↻</button>
        </div>
        <div class="control-row">
            <button id="btn-left" class="mobile-btn">←</button>
            <button id="btn-drop" class="mobile-btn">↓</button>
            <button id="btn-right" class="mobile-btn">→</button>
        </div>
        <div class="control-row center">
            <button id="btn-harddrop" class="mobile-btn long-btn">HARD DROP</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
